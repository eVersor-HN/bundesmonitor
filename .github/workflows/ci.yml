name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python (lint, types, tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install packages (editable)
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/core[dev]"
          pip install -e "apps/api[dev]"
          pip install -e "apps/worker[dev]"
      # Pro Paket, damit die strict-mypy-Konfiguration jedes pyproject greift.
      - name: core
        working-directory: packages/core
        run: ruff check src tests && mypy src && pytest
      - name: api
        working-directory: apps/api
        run: ruff check src tests && mypy src && pytest
      - name: worker
        working-directory: apps/worker
        run: ruff check src tests && mypy src && pytest

  web:
    name: Web (lint, typecheck, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint --workspace @bundesmonitor/web
      - name: Typecheck
        run: npm run typecheck --workspace @bundesmonitor/web
      - name: Build
        run: npm run build --workspace @bundesmonitor/web
