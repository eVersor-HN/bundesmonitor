[project]
name = "bundesmonitor-core"
version = "0.1.0"
description = "Geteilte Domaenenlogik: Datenmodell, Storage, DIP-Ingestion."
requires-python = ">=3.12"
dependencies = [
    "sqlalchemy>=2.0,<2.1",
    "psycopg[binary]>=3.2,<3.3",
    "pydantic>=2.7,<3",
    "pydantic-settings>=2.3,<3",
    "httpx>=0.27,<0.28",
    "boto3>=1.34,<2",
    "tenacity>=8.4,<9",
    "openpyxl>=3.1,<4",
    # XXE-/Entity-Expansion-Schutz beim Parsen fremder RSS-/XML-Feeds.
    "defusedxml>=0.7.1,<0.8",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2,<9",
    "pytest-cov>=5.0,<6",
    "ruff>=0.5,<1",
    "mypy>=1.10,<2",
    "boto3-stubs[s3]>=1.34",
    "types-openpyxl>=3.1",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "N"]

[tool.mypy]
python_version = "3.12"
strict = true
packages = ["bundesmonitor_core"]
mypy_path = "src"
