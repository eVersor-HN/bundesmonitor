services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: bundesmonitor
      POSTGRES_USER: bundesmonitor
      POSTGRES_PASSWORD: bundesmonitor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bundesmonitor -d bundesmonitor"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: bundesmonitor
      MINIO_ROOT_PASSWORD: change-me
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Einmaliger Migrationslauf; Container endet nach Erfolg.
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    working_dir: /app/apps/api
    command: ["alembic", "upgrade", "head"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://bundesmonitor:bundesmonitor@postgres:5432/bundesmonitor
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://bundesmonitor:bundesmonitor@postgres:5432/bundesmonitor
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://bundesmonitor:bundesmonitor@postgres:5432/bundesmonitor
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  beat:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    command: ["celery", "-A", "bundesmonitor_worker.celery_app.celery_app", "beat", "--loglevel=info"]
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  minio_data:
