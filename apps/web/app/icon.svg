<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 1024 1024" role="img" aria-label="Bundesmonitor">
  <rect width="1024" height="1024" rx="180" fill="#0d1320"/>
  
  <!-- Glow-Unterlage -->
  <circle cx="512" cy="512" r="300" fill="none" stroke="#57a9ef" stroke-opacity="0.15" stroke-width="70"/>
  <path d="M274.5,524.5 H399.5 L449.5,399.5 L524.5,637 L574.5,524.5 H749.5" fill="none" stroke="#57a9ef" stroke-opacity="0.15" stroke-width="70" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Chromatic-Ghost (Magenta), leicht versetzt: translate(1 -0.6)*25 = (25 -15) -->
  <g transform="translate(25 -15)" opacity="0.4" fill="none" stroke="#ff3d9a" stroke-width="37" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="512" cy="512" r="300"/>
    <path d="M274.5,524.5 H399.5 L449.5,399.5 L524.5,637 L574.5,524.5 H749.5"/>
  </g>
  <!-- Front (Akzent): Scope-Ring + Live-Puls -->
  <g fill="none" stroke="#57a9ef" stroke-width="46" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="512" cy="512" r="300"/>
    <path d="M274.5,524.5 H399.5 L449.5,399.5 L524.5,637 L574.5,524.5 H749.5"/>
  </g>
  <!-- Live-Node am Ende der Kurve -->
  <circle cx="749.5" cy="524.5" r="38" fill="#57a9ef"/>
