# Alembic-Konfiguration. Die DB-URL wird zur Laufzeit in env.py aus den
# Settings gesetzt (kein Secret in dieser Datei).
[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
timezone = Europe/Berlin

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys_stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
